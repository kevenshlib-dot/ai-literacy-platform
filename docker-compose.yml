services:
  # Nginx + Vue Frontend (入口: http://服务器IP:80)
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: ai-literacy-frontend
    ports:
      - "80:80"
    depends_on:
      - app
    networks:
      - ai-literacy-net
    restart: unless-stopped

  # FastAPI Backend
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: ai-literacy-app
    ports:
      - "8000:8000"
    env_file:
      - .env.production
    environment:
      # 覆盖 host 为 Docker 内部服务名
      - POSTGRES_HOST=postgres
      - ELASTICSEARCH_HOST=elasticsearch
      - MILVUS_HOST=milvus-standalone
      - MINIO_HOST=minio
      - RABBITMQ_HOST=rabbitmq
      - REDIS_HOST=redis
      # LM Studio 运行在宿主机上，通过 host.docker.internal 访问
      - LLM_BASE_URL=http://host.docker.internal:1234/v1
    extra_hosts:
      - "host.docker.internal:host-gateway"
    depends_on:
      postgres:
        condition: service_healthy
      elasticsearch:
        condition: service_healthy
      minio:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - ai-literacy-net
    restart: unless-stopped

  # PostgreSQL
  postgres:
    image: postgres:16-alpine
    container_name: ai-literacy-postgres
    environment:
      POSTGRES_USER: ai_literacy
      POSTGRES_PASSWORD: ai_literacy_pass
      POSTGRES_DB: ai_literacy_db
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ai_literacy -d ai_literacy_db"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - ai-literacy-net
    restart: unless-stopped

  # Elasticsearch
  elasticsearch:
    image: elasticsearch:8.12.0
    container_name: ai-literacy-elasticsearch
    environment:
      - discovery.type=single-node
      - xpack.security.enabled=false
      - "ES_JAVA_OPTS=-Xms512m -Xmx512m"
    ports:
      - "9200:9200"
    volumes:
      - es-data:/usr/share/elasticsearch/data
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:9200/_cluster/health || exit 1"]
      interval: 10s
      timeout: 10s
      retries: 5
    networks:
      - ai-literacy-net
    restart: unless-stopped

  # Milvus - etcd
  etcd:
    image: quay.io/coreos/etcd:v3.5.11
    container_name: ai-literacy-etcd
    environment:
      - ETCD_AUTO_COMPACTION_MODE=revision
      - ETCD_AUTO_COMPACTION_RETENTION=1000
      - ETCD_QUOTA_BACKEND_BYTES=4294967296
      - ETCD_SNAPSHOT_COUNT=50000
    volumes:
      - etcd-data:/etcd
    command: etcd -advertise-client-urls=http://127.0.0.1:2379 -listen-client-urls http://0.0.0.0:2379 --data-dir /etcd
    healthcheck:
      test: ["CMD", "etcdctl", "endpoint", "health"]
      interval: 30s
      timeout: 20s
      retries: 3
    networks:
      - ai-literacy-net
    restart: unless-stopped

  # Milvus - MinIO for Milvus storage
  milvus-minio:
    image: minio/minio:RELEASE.2024-01-11T07-46-16Z
    container_name: ai-literacy-milvus-minio
    environment:
      MINIO_ACCESS_KEY: minioadmin
      MINIO_SECRET_KEY: minioadmin
    ports:
      - "9010:9000"
      - "9011:9001"
    volumes:
      - milvus-minio-data:/minio_data
    command: minio server /minio_data --console-address ":9001"
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 30s
      timeout: 20s
      retries: 3
    networks:
      - ai-literacy-net
    restart: unless-stopped

  # Milvus Standalone
  milvus-standalone:
    image: milvusdb/milvus:v2.3.7
    container_name: ai-literacy-milvus
    command: ["milvus", "run", "standalone"]
    security_opt:
      - seccomp:unconfined
    environment:
      ETCD_ENDPOINTS: etcd:2379
      MINIO_ADDRESS: milvus-minio:9000
    ports:
      - "19530:19530"
      - "9091:9091"
    volumes:
      - milvus-data:/var/lib/milvus
    depends_on:
      - etcd
      - milvus-minio
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9091/healthz"]
      interval: 30s
      timeout: 20s
      retries: 3
    networks:
      - ai-literacy-net
    restart: unless-stopped

  # MinIO (Application Object Storage)
  minio:
    image: minio/minio:RELEASE.2024-01-11T07-46-16Z
    container_name: ai-literacy-minio
    environment:
      MINIO_ACCESS_KEY: minioadmin
      MINIO_SECRET_KEY: minioadmin
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio-data:/data
    command: minio server /data --console-address ":9001"
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 30s
      timeout: 20s
      retries: 3
    networks:
      - ai-literacy-net
    restart: unless-stopped

  # RabbitMQ
  rabbitmq:
    image: rabbitmq:3.13-management-alpine
    container_name: ai-literacy-rabbitmq
    environment:
      RABBITMQ_DEFAULT_USER: guest
      RABBITMQ_DEFAULT_PASS: guest
    ports:
      - "5672:5672"
      - "15672:15672"
    volumes:
      - rabbitmq-data:/var/lib/rabbitmq
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "-q", "ping"]
      interval: 10s
      timeout: 10s
      retries: 5
    networks:
      - ai-literacy-net
    restart: unless-stopped

  # Redis
  redis:
    image: redis:7-alpine
    container_name: ai-literacy-redis
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - ai-literacy-net
    restart: unless-stopped

volumes:
  postgres-data:
  es-data:
  etcd-data:
  milvus-minio-data:
  milvus-data:
  minio-data:
  rabbitmq-data:
  redis-data:

networks:
  ai-literacy-net:
    driver: bridge
