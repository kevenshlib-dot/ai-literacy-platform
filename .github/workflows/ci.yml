name: CI Pipeline

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

jobs:
  lint-and-test:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: ai_literacy
          POSTGRES_PASSWORD: ai_literacy_pass
          POSTGRES_DB: ai_literacy_db
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U ai_literacy"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Cache pip packages
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install ruff

      - name: Lint with ruff
        run: |
          ruff check app/ --select E,F,W --ignore E501

      - name: Run tests
        env:
          POSTGRES_HOST: localhost
          POSTGRES_PORT: 5432
          POSTGRES_USER: ai_literacy
          POSTGRES_PASSWORD: ai_literacy_pass
          POSTGRES_DB: ai_literacy_db
        run: |
          pytest tests/ -v

  docker-build:
    runs-on: ubuntu-latest
    needs: lint-and-test

    steps:
      - uses: actions/checkout@v4

      - name: Build Docker image
        run: docker build -t ai-literacy-platform:test .

      - name: Verify Docker image
        run: docker run --rm ai-literacy-platform:test python -c "from app.main import app; print('App loaded successfully')"
